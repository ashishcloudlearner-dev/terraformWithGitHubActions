name: "Terraform SQS Deployment"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC authentication
      pull-requests: write # Allows the action to comment on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }} # If using Terraform Cloud/HCP

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/GitHubActionsTerraformRole # Replace with your IAM Role ARN
          aws-region: us-east-1 # Must match the region in your main.tf

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan -input=false
        # Post the plan as a comment on the PR for review
        if: github.event_name == 'pull_request'

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        # Only apply on pushes to the 'main' branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
